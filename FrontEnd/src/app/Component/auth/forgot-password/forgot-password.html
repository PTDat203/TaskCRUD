<div class="auth-container">
    <h2>Quên mật khẩu</h2>
  
    <p *ngIf="message" class="success-banner">{{ message }}</p>
    <p *ngIf="errorMessage" class="error-banner">{{ errorMessage }}</p>
  
    <!-- Step 1: Nhập email -->
    <div *ngIf="step === 1">
      <div class="form-group">
        <label for="email">Email:</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" />
      </div>
      <button class="btn-primary" (click)="sendCode()">Gửi mã xác thực</button>
    </div>
  
    <!-- Step 2: Nhập mã -->
    <div *ngIf="step === 2">
      <div class="form-group">
        <label for="code">Mã xác thực 6 số:</label>
        <input id="code" type="text" [(ngModel)]="code" name="code" />
      </div>
      <button class="btn-primary" (click)="verifyCode()">Xác nhận mã</button>
    </div>
  
    <!-- Step 3: Nhập mật khẩu mới -->
    <div *ngIf="step === 3">
      <div class="form-group">
        <label for="newPassword">Mật khẩu mới:</label>
        <input id="newPassword" type="password" [(ngModel)]="newPassword" name="newPassword" />
      </div>
      <button class="btn-primary" (click)="resetPassword()">Đổi mật khẩu</button>
    </div>
  </div>
