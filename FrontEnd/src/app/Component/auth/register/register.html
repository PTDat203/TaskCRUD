<div class="auth-container">
  <h2>Đăng ký</h2>

  <p *ngIf="errorMessage" class="error-banner">{{ errorMessage }}</p>

  <form (ngSubmit)="register()">
    <div class="form-group">
      <label for="name">Họ tên:</label>
      <input id="name" [(ngModel)]="form.name" name="name" required />
    </div>

    <div class="form-group">
      <label for="email">Email:</label>
      <input id="email" [(ngModel)]="form.email" name="email" type="email" required />
    </div>

    <div class="form-group">
      <label for="password">Mật khẩu:</label>
      <input
        id="password"
        [(ngModel)]="form.password"
        name="password"
        type="password"
        required
        autocomplete="new-password"
        minlength="1"
      />
      <small class="hint">Ít nhất 8 ký tự (không tính khoảng trắng).</small>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Xác nhận mật khẩu:</label>
      <input
        id="confirmPassword"
        [(ngModel)]="form.confirmPassword"
        name="confirmPassword"
        type="password"
        required
        autocomplete="new-password"
      />
    </div>

    <button type="submit" class="btn-primary">Đăng ký</button>
  </form>
</div>
